<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Director Dashboard — Open Grace LLC</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="msal-browser-2.38.3.min.js"></script>
<style>
  :root{
    --navy:#1E1C5E; --navy2:#2D2B7F; --orange:#FF6B1A; --purple:#7B35C1;
    --gold:#FFB800; --green:#16A34A; --red:#DC2626; --off:#F8F7FF;
    --line:#E6E4F5; --ink:#1A1830; --muted:#6B6890;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',system-ui,sans-serif;background:var(--off);color:var(--ink);padding-bottom:60px}
  .rainbow{height:5px;background:linear-gradient(90deg,var(--orange),var(--gold),var(--green),var(--purple),var(--navy2))}
  header{background:var(--navy);color:#fff;padding:20px 0 0}
  .wrap{max-width:1120px;margin:0 auto;padding:0 20px}
  .htop{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px}
  h1{font-family:'Fraunces',serif;font-size:1.55rem}
  .sub{opacity:.72;font-size:.83rem;margin-top:2px}
  .who{font-size:.82rem;opacity:.85}
  .who button{background:rgba(255,255,255,.14);color:#fff;border:none;border-radius:8px;
              padding:5px 11px;font-size:.76rem;cursor:pointer;margin-left:8px;font-family:inherit}

  nav{display:flex;gap:3px;margin-top:16px;overflow-x:auto}
  nav button{background:transparent;color:rgba(255,255,255,.72);border:none;padding:11px 15px;
             font-family:inherit;font-size:.87rem;font-weight:600;cursor:pointer;white-space:nowrap;
             border-bottom:3px solid transparent}
  nav button:hover{color:#fff}
  nav button.on{color:#fff;border-bottom-color:var(--orange)}
  nav button .b{background:var(--orange);color:#fff;font-size:.66rem;padding:1px 6px;
                border-radius:99px;margin-left:5px;font-weight:700}
  nav button .b.warn{background:var(--red)}

  .gate{max-width:410px;margin:80px auto;background:#fff;border:1px solid var(--line);
        border-radius:16px;padding:34px;text-align:center}
  .gate h2{font-family:'Fraunces',serif;color:var(--navy);margin-bottom:7px}
  .gate p{color:var(--muted);font-size:.88rem;margin-bottom:20px}
  .btn{background:var(--navy);color:#fff;padding:12px 22px;font-size:.92rem;border:none;
       border-radius:10px;font-family:inherit;font-weight:600;cursor:pointer}

  .app{display:none;padding-top:24px}
  .pane{display:none} .pane.on{display:block}

  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(178px,1fr));gap:13px;margin-bottom:20px}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px 17px}
  .kpi .lab{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
  .kpi .val{font-family:'Fraunces',serif;font-size:1.55rem;font-weight:700;margin-top:4px}
  .kpi .note{font-size:.73rem;color:var(--muted);margin-top:2px}
  .g{color:var(--green)} .o{color:var(--orange)} .r{color:var(--red)} .n{color:var(--navy)}

  h2.sec{font-family:'Fraunces',serif;color:var(--navy);font-size:1.13rem;margin:24px 0 11px}
  table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);
        border-radius:14px;overflow:hidden;font-size:.86rem}
  th{background:#F4F3FB;color:var(--navy);text-align:left;padding:10px 13px;font-size:.71rem;
     text-transform:uppercase;letter-spacing:.05em;font-weight:700}
  td{padding:11px 13px;border-top:1px solid var(--line);vertical-align:top}
  td.num{font-variant-numeric:tabular-nums;font-weight:600}
  .bar{height:6px;background:var(--line);border-radius:99px;overflow:hidden;margin-top:4px;width:110px}
  .bar span{display:block;height:100%;background:var(--green)}
  .bar.warm span{background:var(--gold)} .bar.hot span{background:var(--red)}
  .chip{display:inline-block;font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:99px}
  .chip.ok{background:#E8F5EC;color:#136B33} .chip.soon{background:#FFF4D6;color:#8A6A00}
  .chip.late{background:#FDE8E8;color:#9B1C1C} .chip.off{background:#EEE;color:#666}

  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:17px 19px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:800px){.two{grid-template-columns:1fr}}
  .card h3{font-family:'Fraunces',serif;color:var(--navy);font-size:1rem;margin-bottom:3px}
  .card .hint{font-size:.76rem;color:var(--muted);margin-bottom:11px}
  .row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:.85rem}
  .row:last-child{border:none}
  .tag{background:var(--gold);color:#5A4200;font-size:.64rem;font-weight:700;padding:2px 7px;border-radius:99px;margin-left:6px}

  .rate-bar{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 18px;
            margin-bottom:16px;display:flex;gap:16px;align-items:center;flex-wrap:wrap}
  .rate-bar label{font-size:.68rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
  .rate-bar input{font-family:inherit;font-size:1rem;font-weight:700;color:var(--navy);
                  border:1px solid var(--line);border-radius:8px;padding:7px 10px;width:96px}
  .rate-bar .note{font-size:.74rem;color:var(--muted);flex:1;min-width:220px}
  .rate-bar a{color:var(--orange)}

  a.lnk{display:block;padding:9px 11px;border-radius:9px;text-decoration:none;color:var(--ink);
        font-size:.85rem;font-weight:600;border:1px solid var(--line);margin-bottom:6px}
  a.lnk:hover{background:var(--off)}
  a.lnk small{display:block;font-weight:400;color:var(--muted);font-size:.72rem;margin-top:1px}

  .alert{border-radius:12px;padding:12px 16px;font-size:.82rem;margin-bottom:14px;line-height:1.5}
  .alert.warn{background:#FFF8E7;border:1px solid #F5E3B0;color:#6B5518}
  .alert.bad{background:#FDE8E8;border:1px solid #F5C2C2;color:#8B1A1A}
  .alert b{font-weight:700}
  .loading{color:var(--muted);padding:22px;text-align:center;font-size:.88rem}
</style>
</head>
<body>
<div class="rainbow"></div>
<header>
  <div class="wrap">
    <div class="htop">
      <div>
        <h1>Director Dashboard</h1>
        <div class="sub">Open Grace LLC · IRC Vendor PJ6208 · Service Code 076</div>
      </div>
      <div class="who" id="who"></div>
    </div>
    <nav id="nav"></nav>
  </div>
</header>

<div class="wrap">
  <div class="gate" id="gate">
    <h2>Director Access</h2>
    <p>Sign in with your Open Grace account.</p>
    <button class="btn" onclick="signIn()">Sign In with Microsoft</button>
  </div>

  <div class="app" id="app">
    <div id="alerts"></div>
    <div class="pane on" id="p-home"><div class="loading">Loading…</div></div>
    <div class="pane" id="p-clients"></div>
    <div class="pane" id="p-notes"></div>
    <div class="pane" id="p-money"></div>
    <div class="pane" id="p-staff"></div>
  </div>
</div>

<script>
const SITE="netorg20110136.sharepoint.com,c877f168-84b1-4fe4-929b-4322d99beb2e,29f001f9-49ec-44b1-991b-281f4fe3ad22";
const L_CLIENTS="75f9bb15-c1b4-449e-a7ff-b22eddbd74f0";
const L_LOGS="9699e9a8-833c-4c23-8181-0312117cce96";
const L_STAFF="6cb10b54-cbf2-4a54-9218-d40b1083386e";

const msalInstance=new msal.PublicClientApplication({
  auth:{clientId:"ede1a3cf-cf8d-466b-94f0-ed1008ad0f5f",
        authority:"https://login.microsoftonline.com/1916d89f-0ee3-4972-a513-d91fb3007040",
        redirectUri:window.location.origin+"/director.html"},
  cache:{cacheLocation:"sessionStorage"}
});

let CLIENTS=[],LOGS=[],STAFF=[],RATE=58.64,COST=25.00,TAB="home";

function signIn(){msalInstance.loginRedirect({scopes:["User.Read","Sites.ReadWrite.All"]});}
function signOut(){msalInstance.logoutRedirect();}

async function tok(){
  const a=msalInstance.getAllAccounts()[0];
  const r=await msalInstance.acquireTokenSilent({scopes:["Sites.ReadWrite.All"],account:a});
  return r.accessToken;
}
async function list(id){
  const t=await tok();
  const r=await fetch(`https://graph.microsoft.com/v1.0/sites/${SITE}/lists/${id}/items?expand=fields&$top=300`,
                      {headers:{Authorization:"Bearer "+t}});
  if(!r.ok) throw new Error("Graph "+r.status);
  const d=await r.json();
  return (d.value||[]).map(i=>i.fields);
}

const money=n=>"$"+ (n||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const days=d=>Math.ceil((new Date(d)-new Date())/864e5);
function qprChip(d){
  if(!d) return '<span class="chip off">—</span>';
  const n=days(d);
  if(n<0) return `<span class="chip late">OVERDUE ${Math.abs(n)}d</span>`;
  if(n<=30) return `<span class="chip soon">${n}d</span>`;
  return `<span class="chip ok">${n}d</span>`;
}

async function load(){
  [CLIENTS,LOGS,STAFF]=await Promise.all([list(L_CLIENTS),list(L_LOGS),list(L_STAFF)]);
  render();
}

// hours logged per client UCI
function logged(uci){
  return LOGS.filter(l=>l.UCI===uci).reduce((s,l)=>s+(parseFloat(l.HoursSpent)||0),0);
}

function active(){ return CLIENTS.filter(c=>c.ClientStatus==="Active"); }

function nav(){
  const A=active();
  const overdue=A.filter(c=>c.QPRDue&&days(c.QPRDue)<30).length;
  const tabs=[
    ["home","🏠 Overview",0],
    ["clients","👥 Clients & QPR",A.length],
    ["notes","📝 Contact Logs",LOGS.length],
    ["money","💵 Finance",0],
    ["staff","👔 Staff",STAFF.filter(s=>s.Active==="Yes").length]
  ];
  document.getElementById("nav").innerHTML=tabs.map(([k,l,n])=>
    `<button class="${TAB===k?'on':''}" onclick="go('${k}')">${l}${
      n?`<span class="b${k==='clients'&&overdue?' warn':''}">${n}</span>`:""}</button>`).join("");
}
function go(t){TAB=t;nav();document.querySelectorAll(".pane").forEach(p=>p.classList.remove("on"));
  document.getElementById("p-"+t).classList.add("on");}

function render(){
  nav();
  const A=active();

  // ── alerts ──
  let al="";
  const soon=A.filter(c=>c.QPRDue&&days(c.QPRDue)>=0&&days(c.QPRDue)<=30);
  const late=A.filter(c=>c.QPRDue&&days(c.QPRDue)<0);
  const byQ={}; A.forEach(c=>{if(c.QPRDue){const d=c.QPRDue.split("T")[0];byQ[d]=(byQ[d]||0)+1;}});
  const coll=Object.entries(byQ).filter(([,n])=>n>1);
  if(late.length) al+=`<div class="alert bad"><b>⛔ ${late.length} QPR overdue:</b> ${late.map(c=>c.Title).join(", ")}</div>`;
  if(soon.length) al+=`<div class="alert warn"><b>⏰ QPR due within 30 days:</b> ${soon.map(c=>`${c.Title} (${days(c.QPRDue)}d)`).join(", ")}</div>`;
  if(coll.length) al+=`<div class="alert warn"><b>📅 QPR collision:</b> ${coll.map(([d,n])=>`${n} reports both due ${d}`).join("; ")} — block that week now.</div>`;
  document.getElementById("alerts").innerHTML=al;

  // ── overview ──
  let auth=0,used=0;
  A.forEach(c=>{auth+=parseFloat(c.AuthorizedHours)||0;used+=logged(c.UCI);});
  const staffOn=STAFF.filter(s=>s.Active==="Yes");
  const recent=[...LOGS].sort((a,b)=>(b.ContactDate||"").localeCompare(a.ContactDate||"")).slice(0,5);

  document.getElementById("p-home").innerHTML=`
    <div class="kpis">
      <div class="kpi"><div class="lab">Active clients</div><div class="val n">${A.length}</div>
        <div class="note">${CLIENTS.length-A.length} inactive</div></div>
      <div class="kpi"><div class="lab">Authorized hours</div><div class="val n">${auth}</div>
        <div class="note">${money(auth*RATE)} on the books</div></div>
      <div class="kpi"><div class="lab">Hours logged</div><div class="val g">${used.toFixed(1)}</div>
        <div class="note">${money(used*RATE)} billable</div></div>
      <div class="kpi"><div class="lab">Unbilled</div><div class="val ${auth-used>0?'r':'g'}">${(auth-used).toFixed(1)}</div>
        <div class="note">${money((auth-used)*RATE)} at risk</div></div>
      <div class="kpi"><div class="lab">Staff</div><div class="val n">${staffOn.length}</div>
        <div class="note">active</div></div>
    </div>
    <div class="two">
      <div class="card"><h3>Recent contacts</h3><div class="hint">Last 5 logged</div>
        ${recent.length?recent.map(l=>`<div class="row"><span>${l.Title||"—"}
          <span style="color:var(--muted);font-size:.76rem"> · ${l.NavigatorName||"—"}</span></span>
          <span style="font-weight:600">${(parseFloat(l.HoursSpent)||0).toFixed(2)}h</span></div>`).join("")
          :'<div style="color:var(--muted);font-size:.85rem">No contacts logged yet.</div>'}
      </div>
      <div class="card"><h3>Quick links</h3><div class="hint">Where the real work happens</div>
        <a class="lnk" href="console.html" target="_blank">Director Console<small>Every admin link</small></a>
        <a class="lnk" href="https://ebilling.inlandrc.org/login" target="_blank">IRC eBilling<small>Submit invoices</small></a>
        <a class="lnk" href="contact-log.html" target="_blank">Log a contact<small>Add a new entry</small></a>
      </div>
    </div>`;

  // ── clients ──
  document.getElementById("p-clients").innerHTML=`
    <h2 class="sec">Active caseload</h2>
    <table><tr><th>Client</th><th>UCI</th><th>Navigator</th><th>Authorized</th><th>Logged</th>
      <th>Remaining</th><th>Value</th><th>QPR due</th></tr>
    ${A.length?A.map(c=>{
      const a=parseFloat(c.AuthorizedHours)||0, u=logged(c.UCI), p=a?Math.min(100,u/a*100):0;
      const cls=p>85?"hot":p>60?"warm":"";
      return `<tr>
        <td><b>${c.Title||"—"}</b></td>
        <td>${c.UCI||"—"}</td>
        <td>${c.Navigator||'<span style="color:var(--red)">unassigned</span>'}</td>
        <td class="num">${a}</td>
        <td class="num">${u.toFixed(2)}<div class="bar ${cls}"><span style="width:${p}%"></span></div></td>
        <td class="num">${(a-u).toFixed(2)}</td>
        <td class="num g">${money(a*RATE)}</td>
        <td>${c.QPRDue?c.QPRDue.split("T")[0]:"—"}<br>${qprChip(c.QPRDue)}</td></tr>`;
    }).join(""):'<tr><td colspan="8" style="color:var(--muted)">No active clients.</td></tr>'}</table>

    <h2 class="sec">Inactive / closed</h2>
    <table><tr><th>Client</th><th>UCI</th><th>Status</th><th>Why</th></tr>
    ${CLIENTS.filter(c=>c.ClientStatus!=="Active").map(c=>`<tr>
      <td>${c.Title||"—"}</td><td>${c.UCI||"—"}</td>
      <td><span class="chip off">${c.ClientStatus||"—"}</span></td>
      <td style="color:var(--muted)">${c.ReferralStatus||"—"}</td></tr>`).join("")
      ||'<tr><td colspan="4" style="color:var(--muted)">None.</td></tr>'}</table>`;

  // ── contact logs ──
  const sorted=[...LOGS].sort((a,b)=>(b.ContactDate||"").localeCompare(a.ContactDate||""));
  document.getElementById("p-notes").innerHTML=`
    <h2 class="sec">Contact logs <span style="font-weight:400;font-size:.8rem;color:var(--muted)">
      · feeds QPR Enclosure D</span></h2>
    <table><tr><th>Date</th><th>Client</th><th>Navigator</th><th>Type</th><th>Hours</th><th>Notes</th></tr>
    ${sorted.length?sorted.map(l=>`<tr>
      <td>${l.ContactDate?l.ContactDate.split("T")[0]:"—"}</td>
      <td>${(l.Title||"").replace(/^\d{4}-\d{2}-\d{2}\s*[—-]\s*/,"")||"—"}</td>
      <td>${l.NavigatorName||"—"}</td>
      <td>${l.ContactType||"—"}</td>
      <td class="num">${(parseFloat(l.HoursSpent)||0).toFixed(2)}</td>
      <td style="color:var(--muted);max-width:340px">${(l.ProgressNotes||"").slice(0,110)}${(l.ProgressNotes||"").length>110?"…":""}</td>
      </tr>`).join(""):'<tr><td colspan="6" style="color:var(--muted)">No contacts logged yet.</td></tr>'}</table>`;

  // ── finance ──
  const earned=used*RATE, labor=used*COST, margin=earned-labor, perHr=RATE-COST;
  const now=new Date(), bm=now.getMonth(), by=now.getFullYear();
  let cut=new Date(by,bm,4,16,30);
  if(now>cut) cut=new Date(by,bm+1,4,16,30);
  const pay=new Date(cut.getFullYear(),cut.getMonth(),20);
  const svc=new Date(cut.getFullYear(),cut.getMonth()-1,1);
  const dLeft=Math.ceil((cut-now)/864e5);

  const pr=[];
  for(let m=0;m<2;m++){
    const b=new Date(by,bm+m,1);
    pr.push(new Date(b.getFullYear(),b.getMonth(),1));
    pr.push(new Date(b.getFullYear(),b.getMonth(),15));
  }
  const up=pr.filter(d=>d>=new Date(by,bm,now.getDate())).slice(0,4);

  document.getElementById("p-money").innerHTML=`
    <div class="rate-bar">
      <div><label>Billable rate /hr</label><br>
        <input type="number" id="r" value="${RATE}" step="0.01" oninput="RATE=parseFloat(this.value)||0;render()"></div>
      <div><label>Coordinator cost /hr</label><br>
        <input type="number" id="c" value="${COST}" step="0.01" oninput="COST=parseFloat(this.value)||0;render()"></div>
      <div class="note">IRC pays <b>$58.64/hr</b> for code 076 (DDS-set). Rates are changing under
        <b>Burns Rate Reform</b> — verify yours with the
        <a href="https://www.inlandrc.org/vendor-search/" target="_blank">Rate Search Tool</a>.</div>
    </div>
    <div class="kpis">
      <div class="kpi"><div class="lab">Authorization value</div><div class="val g">${money(auth*RATE)}</div>
        <div class="note">${auth} hours</div></div>
      <div class="kpi"><div class="lab">Billable so far</div><div class="val n">${money(earned)}</div>
        <div class="note">${used.toFixed(2)} hours logged</div></div>
      <div class="kpi"><div class="lab">Still to deliver</div><div class="val ${auth-used>0?'r':'g'}">${money((auth-used)*RATE)}</div>
        <div class="note">expires with the auth</div></div>
      <div class="kpi"><div class="lab">Gross margin</div><div class="val g">${money(margin)}</div>
        <div class="note">${money(perHr)}/hr · ${RATE?Math.round(perHr/RATE*100):0}%</div></div>
    </div>
    <div class="two">
      <div class="card"><h3>🧾 IRC billing cycle</h3><div class="hint">Miss the cut-off, wait weeks</div>
        <div class="row"><span><b>Next cut-off</b>
          <span style="color:var(--muted);font-size:.76rem"> · ${svc.toLocaleDateString("en-US",{month:"long"})} services</span></span>
          <span style="font-weight:700;color:${dLeft<=5?'var(--red)':'var(--ink)'}">
            ${cut.toLocaleDateString("en-US",{month:"short",day:"numeric"})} 4:30pm${dLeft<=5?` · ${dLeft}d`:""}</span></div>
        <div class="row"><span>Payment lands</span>
          <span style="font-weight:600;color:var(--green)">~${pay.toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span></div>
        <div style="font-size:.76rem;color:var(--muted);margin-top:9px;line-height:1.45">
          After cut-off but before the 14th → paid end of month. <b>After the 14th → next month.</b><br>
          <span style="color:var(--red)"><b>90-day hard limit</b> (W&amp;I 4641.5) — past that, unbillable.</span></div>
        <a class="lnk" href="https://ebilling.inlandrc.org/login" target="_blank" style="margin-top:10px">
          IRC eBilling<small>Submit invoices</small></a>
      </div>
      <div class="card"><h3>💵 Payroll</h3><div class="hint">Semi-monthly · 1st &amp; 15th</div>
        ${up.map((d,i)=>`<div class="row"><span><b>${d.toLocaleDateString("en-US",{month:"short",day:"numeric"})}</b>
          <span style="color:var(--muted);font-size:.76rem"> · ${d.getDate()===1?"covers 16th–EOM":"covers 1st–15th"}</span>
          ${i===0?'<span class="tag">NEXT</span>':""}</span></div>`).join("")}
        <div style="font-size:.76rem;color:var(--muted);margin-top:10px;line-height:1.45">
          Pull hours from Contact Logs before each run. <b>An hour not logged is an hour not billed.</b></div>
      </div>
    </div>`;

  // ── staff ──
  document.getElementById("p-staff").innerHTML=`
    <h2 class="sec">Staff</h2>
    <table><tr><th>Name</th><th>Role</th><th>Code</th><th>Status</th><th>Assigned clients</th><th>Hours logged</th></tr>
    ${STAFF.map(s=>{
      let cl=[]; try{cl=JSON.parse(s.AssignedClients||"[]");}catch(e){}
      const h=LOGS.filter(l=>(l.NavigatorName||"").toLowerCase().includes((s.Title||"").split(",")[0].toLowerCase()))
                  .reduce((x,l)=>x+(parseFloat(l.HoursSpent)||0),0);
      return `<tr>
        <td><b>${s.Title||"—"}</b><br><span style="color:var(--muted);font-size:.76rem">${s.Email||""}</span></td>
        <td>${s.Role||"—"}</td><td>${s.StaffCode||"—"}</td>
        <td><span class="chip ${s.Active==="Yes"?"ok":"off"}">${s.Active==="Yes"?"Active":"Inactive"}</span></td>
        <td>${cl.length?cl.join(", "):'<span style="color:var(--muted)">none</span>'}</td>
        <td class="num">${h.toFixed(2)}</td></tr>`;
    }).join("")}</table>
    <div style="font-size:.78rem;color:var(--muted);margin-top:10px;line-height:1.5">
      <b>To assign a client:</b> set <b>Navigator</b> on the client record <i>and</i> add the client's
      <b>lowercase last name</b> to that staff member's <b>AssignedClients</b> — e.g. <code>["pinto","beinbrech"]</code>.
      Both are required, or the client won't appear in their portal.
    </div>`;
}

(async()=>{
  await msalInstance.initialize();
  try{await msalInstance.handleRedirectPromise();}catch(e){}
  const acct=msalInstance.getAllAccounts()[0];
  if(acct){
    document.getElementById("gate").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("who").innerHTML=
      `${acct.name||acct.username}<button onclick="signOut()">Sign out</button>`;
    try{await load();}
    catch(e){document.getElementById("p-home").innerHTML=
      `<div class="alert bad">Couldn't load data: ${e.message}</div>`;}
  }
})();
</script>
</body>
</html>
