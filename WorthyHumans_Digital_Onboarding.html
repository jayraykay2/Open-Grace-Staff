<!-- WORTHY HUMANS, INC. — Digital Employee Onboarding Packet
     Self-contained. No external libraries, no network, no browser storage.
     Save progress = downloads a .json the user controls. Copies = Print / Save as PDF. -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Worthy Humans — Digital Onboarding</title>
<style>
  :root{
    --ink:#16323D; --teal:#117A86; --teal-deep:#0C5A63;
    --seafoam:#E8F2F2; --seafoam-line:#CBE3E3;
    --paper:#F4F7F7; --card:#FFFFFF; --gray:#5C6B72;
    --line:#DCE5E7; --amber:#B97A1F; --amber-bg:#FBF1E0;
    --green:#2E7D5B; --green-bg:#E7F3EC; --danger:#B23A48;
    --serif:Georgia,"Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --script:"Snell Roundhand","Brush Script MT","Segoe Script",cursive;
    --shadow:0 1px 2px rgba(22,50,61,.06),0 8px 24px rgba(22,50,61,.06);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15.5px;line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:var(--teal-deep)}

  /* ---------- top brand + progress ---------- */
  .letterhead{background:#fff;text-align:center;padding:24px 20px 14px;border-bottom:1px solid var(--line)}
  .letterhead img.logo{height:66px;width:auto;display:inline-block}
  @media(max-width:480px){.letterhead img.logo{height:52px}}
  .brand{background:linear-gradient(180deg,var(--teal) 0%,var(--teal-deep) 100%);color:#fff;padding:20px 20px 22px}
  .brand-inner{max-width:920px;margin:0 auto}
  .brand .eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;opacity:.82;margin:0}
  .brand h1{font-family:var(--serif);font-weight:600;font-size:30px;line-height:1.15;margin:6px 0 4px}
  .brand .sub{font-style:italic;font-family:var(--serif);opacity:.92;margin:0 0 2px}
  .brand .confidential{font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;opacity:.72;margin-top:12px}

  .progress-wrap{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.94);backdrop-filter:saturate(1.1) blur(6px);border-bottom:1px solid var(--line)}
  .progress-inner{max-width:920px;margin:0 auto;padding:11px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .pbar{flex:1 1 240px;min-width:200px;height:9px;background:var(--seafoam);border-radius:999px;overflow:hidden}
  .pbar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--teal),var(--green));transition:width .35s ease;border-radius:999px}
  .pstat{font-size:13px;color:var(--gray);white-space:nowrap}
  .pstat b{color:var(--ink)}
  .pbtns{display:flex;gap:8px;flex-wrap:wrap}

  .btn{font:inherit;font-size:13.5px;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--ink);padding:8px 13px;border-radius:9px;cursor:pointer;transition:.15s}
  .btn:hover{border-color:var(--teal);color:var(--teal-deep)}
  .btn.primary{background:var(--teal);border-color:var(--teal);color:#fff}
  .btn.primary:hover{background:var(--teal-deep);color:#fff}
  .btn.ghost{background:transparent}
  .btn:focus-visible,input:focus-visible,textarea:focus-visible,.ack:focus-within{outline:3px solid var(--seafoam-line);outline-offset:2px}

  /* ---------- layout ---------- */
  .page{max-width:920px;margin:0 auto;padding:26px 20px 80px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px 24px;margin:18px 0;box-shadow:var(--shadow)}
  .card h2{font-family:var(--serif);font-size:21px;font-weight:600;margin:0 0 2px;display:flex;align-items:baseline;gap:10px}
  .sec-no{font-size:12px;font-weight:700;letter-spacing:.12em;color:var(--teal);background:var(--seafoam);border-radius:6px;padding:3px 8px;white-space:nowrap}
  .card .lede{color:var(--gray);font-size:14px;margin:2px 0 16px}
  .body p{margin:10px 0}
  .body h4{font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--teal-deep);margin:18px 0 6px}
  .body ul{margin:8px 0;padding-left:20px}
  .body li{margin:5px 0}
  .callout{background:var(--amber-bg);border:1px solid #ECD9B0;border-left:4px solid var(--amber);border-radius:8px;padding:12px 14px;font-size:14px;margin:14px 0}
  .timeline{background:var(--seafoam);border-radius:10px;padding:12px 16px;margin:14px 0}
  .timeline b{color:var(--teal-deep)}

  /* fields */
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px 16px}
  @media(max-width:640px){.grid{grid-template-columns:1fr}}
  .field label{display:block;font-size:12px;font-weight:600;letter-spacing:.03em;color:var(--gray);margin-bottom:4px;text-transform:uppercase}
  .field input,.field textarea{width:100%;font:inherit;font-size:15px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 11px}
  .field input[readonly]{background:var(--seafoam);color:var(--teal-deep);font-weight:600}
  .field .hint{font-size:12px;color:var(--gray);margin-top:3px}
  .req:after{content:" *";color:var(--danger)}

  /* acknowledgement checklist */
  .acks{margin:14px 0 4px;border-top:1px dashed var(--line);padding-top:14px}
  .acks-title{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--teal-deep);font-weight:700;margin-bottom:8px}
  .ack{display:flex;gap:10px;align-items:flex-start;padding:8px 10px;border:1px solid var(--line);border-radius:9px;margin:6px 0;background:#fff;cursor:pointer;transition:.12s}
  .ack:hover{border-color:var(--seafoam-line);background:#FCFEFE}
  .ack.on{background:var(--seafoam);border-color:var(--seafoam-line)}
  .ack input{margin-top:3px;width:17px;height:17px;accent-color:var(--teal);flex:none;cursor:pointer}
  .ack span{font-size:14px}
  .ckgroup{margin:10px 0}
  .ckgroup > .acks-title{margin-bottom:6px}

  /* signature block */
  .sign{margin-top:16px;border:1px dashed var(--seafoam-line);border-radius:12px;padding:14px 16px;background:#FAFDFD}
  .sign.signed{border-style:solid;border-color:var(--green);background:var(--green-bg)}
  .sign .row{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
  .sig-render{font-family:var(--script);font-size:30px;line-height:1.1;color:var(--ink);min-height:34px}
  .sig-meta{font-size:12.5px;color:var(--gray)}
  .sig-meta b{color:var(--ink)}
  .badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;letter-spacing:.04em;padding:4px 10px;border-radius:999px}
  .badge.pending{color:var(--amber);background:var(--amber-bg)}
  .badge.done{color:var(--green);background:var(--green-bg)}
  .annual-note{font-size:12px;color:var(--amber);margin-top:8px;font-weight:600}

  /* identity setup */
  .setup{border:2px solid var(--teal);background:linear-gradient(180deg,#fff,#F7FCFC)}
  .consent{display:flex;gap:10px;align-items:flex-start;margin-top:14px;padding:12px;border-radius:10px;background:var(--seafoam)}
  .consent input{margin-top:3px;width:18px;height:18px;accent-color:var(--teal);flex:none}
  .consent label{font-size:13.5px}

  .director-toggle{margin-top:10px}
  details.director{border:1px solid var(--line);border-radius:10px;padding:0;margin-top:14px;overflow:hidden}
  details.director > summary{cursor:pointer;padding:12px 16px;font-weight:600;font-size:14px;background:#fff;list-style:none}
  details.director > summary::-webkit-details-marker{display:none}
  details.director > summary:before{content:"▸ ";color:var(--teal)}
  details.director[open] > summary:before{content:"▾ "}
  details.director .inner{padding:0 16px 16px}

  .toc{columns:2;column-gap:28px;font-size:14px;margin:4px 0}
  @media(max-width:560px){.toc{columns:1}}
  .toc a{display:block;padding:5px 0;text-decoration:none;color:var(--ink);border-bottom:1px solid var(--line)}
  .toc a:hover{color:var(--teal-deep)}
  .toc a .n{color:var(--teal);font-weight:700;margin-right:8px}
  .toc a .tick{float:right;color:var(--green);font-weight:700}

  /* summary table */
  table.summary{width:100%;border-collapse:collapse;font-size:13.5px;margin-top:8px}
  table.summary th,table.summary td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}
  table.summary th{font-size:11.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--gray)}
  table.summary td.s-done{color:var(--green);font-weight:600}
  table.summary td.s-pending{color:var(--amber);font-weight:600}

  .footer-note{font-size:12px;color:var(--gray);text-align:center;margin-top:30px;line-height:1.7}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:10px;font-size:14px;opacity:0;pointer-events:none;transition:.3s;z-index:90;box-shadow:var(--shadow)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .print-only{display:none}

  /* signature style toggle + draw pad */
  .sigmode{display:flex;gap:8px;margin:14px 0 6px;align-items:center;flex-wrap:wrap}
  .sigmode .lbl{font-size:12px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--gray);margin-right:4px}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{font:inherit;font-size:13.5px;font-weight:600;border:none;background:#fff;color:var(--gray);padding:7px 16px;cursor:pointer}
  .seg button.on{background:var(--teal);color:#fff}
  .padwrap{margin-top:10px}
  .padwrap.hide{display:none}
  canvas.sigpad{width:100%;height:150px;border:1px dashed var(--seafoam-line);border-radius:10px;background:#fff;touch-action:none;cursor:crosshair;display:block}
  .padrow{display:flex;gap:8px;margin-top:8px;align-items:center}
  .padrow .baseline{flex:1;font-size:12px;color:var(--gray)}
  .sig-img{height:46px;display:block}

  /* finish / submit */
  .finish{border:2px solid var(--teal);background:linear-gradient(180deg,#fff,#F7FCFC)}
  .finish .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
  .finish .pending-list{font-size:13px;color:var(--amber);margin-top:10px}

  /* ---------- print / PDF ---------- */
  @media print{
    @page{margin:14mm 14mm 18mm}
    body{background:#fff;font-size:11px}
    .progress-wrap,.pbtns,.toc-card,.toast,.no-print,.director-toggle summary,details.director > summary{display:none !important}
    .brand{background:#fff !important;color:var(--ink) !important;border-bottom:2px solid var(--teal);padding:0 0 12px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .letterhead{border-bottom:none;padding:0 0 8px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .letterhead img.logo{height:58px}
    .brand .confidential,.brand .eyebrow{color:var(--gray) !important;opacity:1}
    .page{padding:0;max-width:none}
    .card{box-shadow:none;border:1px solid #ccc;border-radius:0;page-break-inside:avoid;break-inside:avoid;margin:0 0 10px}
    .card.sec{page-break-before:always}
    details.director{border:none}
    details.director[open] .inner,details.director .inner{padding:0}
    details.director > summary{display:none}
    .ack{border:none;padding:2px 0;background:none !important}
    .ack input{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .sign{background:none !important;border:1px solid #999}
    .sig-render{color:#000}
    .sig-img{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .sigmode,.padwrap,.finish,.seg{display:none !important}
    .print-only{display:block}
    a{color:inherit;text-decoration:none}
    .callout,.timeline,.consent,.sec-no,.badge,.field input[readonly]{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }
</style>

  {id:"s1", no:"Section 1", title:"New Employee Checklist", lede:"Complete all items before end of first week.",
   type:"checklist", annual:false,
   body:`<p>Your supervisor will review this checklist with you during orientation. Check each item as it is reviewed and completed. The signed checklist is retained by the CFS Director.</p>`},

  {id:"s2", no:"Section 2", title:"At-Will & Employment Acknowledgment", lede:"Please read carefully before signing.",
   annual:false,
   body:`<p>WORTHY HUMANS, INC. is an at-will employer. This means that either you or the company may terminate the employment relationship at any time, with or without cause, and with or without advance notice, subject to applicable law.</p>
   <p>No supervisor, manager, or representative of WORTHY HUMANS, INC. — other than the Executive Director — has any authority to enter into any agreement for employment for any specified period of time or to make any agreement contrary to the at-will policy. Any such agreement must be in writing and signed by the Executive Director.</p>
   <p>Nothing in this packet, the Employee Handbook, or any other company document should be construed as creating a contract of employment for a specific duration. The at-will nature of employment cannot be modified except by a written agreement signed by the Executive Director.</p>`,
   acks:[

   ]},

  {id:"s3", no:"Section 3", title:"Job Description Acknowledgment", lede:"Confirm you have reviewed your role and responsibilities.",
   annual:false,
   body:`<p>I acknowledge that I have received, read, and understood the job description for my position at WORTHY HUMANS, INC. I understand the duties, responsibilities, and minimum qualifications associated with my role.</p>
   <p>I understand my job description is not all-inclusive and that I may be asked to perform additional duties as needed to meet the ongoing needs of the organization and Individuals Served. I understand my job description may be updated from time to time, and I will be notified of any significant changes.</p>`,
   acks:[
    "I have read and understand the full job description for my position (CFS Director or Family Support Coordinator, as applicable).",
    "I understand I may not provide CFS services to any Individual who resides in the same home as me.",
    "I understand I must maintain current CPR and First Aid certification at all times as a condition of employment.",
    "I understand I must pass and maintain a LIVESCAN clearance as a condition of employment.",
    "I understand I must attend all mandatory In-Service training sessions semi-annually, and failure to do so may result in disciplinary action.",
    "I understand I must maintain accurate, current, and legible records at all times.",
    "I understand my role requires positive, professional relationships with Regional Center staff and each Individual's circle of support.",
    "I will value the dignity and worth of every Person Served and treat them with respect at all times."
   ]},

  {id:"s4", no:"Section 4", title:"Confidentiality & HIPAA Agreement", lede:"Protecting the privacy of every Person Served.",
   annual:false,
   body:`<p>As an employee of WORTHY HUMANS, INC., you will have access to sensitive and confidential information about Individuals Served, their families, and the organization. This information is protected by HIPAA (1996), California law, and Worthy Humans policy.</p>
   <h4>Permitted Disclosures</h4>
   <p>Confidential information may be shared only: (1) with the written authorization of the Person Served or their legal conservator; (2) as required by law (e.g., mandatory abuse reporting); (3) within the treatment/support team on a need-to-know basis; or (4) as directed by the CFS Director in accordance with applicable law.</p>`,
   acks:[
    "I will not disclose personally identifiable information about any Person Served to any unauthorized person, including family members not in the circle of support.",
    "I will access client records only to the extent necessary to perform my assigned duties.",
    "I will not discuss client information in public settings such as restaurants, waiting rooms, or social gatherings.",
    "I will not post, share, or reference any information about Persons Served on any social media platform or online forum.",
    "I will store all physical documents in a secure, locked location at all times.",
    "I will use locking clipboards or briefcases when transporting mobile documents.",
    "I will immediately notify the CFS Director of any suspected breach or lost, stolen, or improperly accessed confidential documents.",
    "I understand my confidentiality obligation continues after my employment ends.",
    "I understand HIPAA violations may carry civil and criminal penalties and may result in immediate termination."
   ]},

  {id:"s5", no:"Section 5", title:"Zero Tolerance / Mandated Reporter Policy", lede:"Mandated reporting of abuse & neglect.",
   annual:true,
   body:`<p>As an individual who provides support to Persons Served by a Regional Center, I understand I am a mandated reporter of suspected abuse and neglect. A zero-tolerance policy is established for the organization's employees, families, volunteers, and participants. Abuse and neglect of any kind — including physical abuse, mishandling of finances, inappropriate sexual behaviors, belittling or offensive verbalizations, abandonment, isolation, abduction, and the deprivation of services — will not be tolerated.</p>
   <p>Upon becoming aware of an allegation, I will take immediate action to ensure the health and safety of the involved Person Served and all others. Any agency representative accused of abuse or neglect will be immediately removed from contact with Persons Served. If the investigation supports the allegation, the employee will be immediately terminated.</p>
   <div class="timeline"><b>Required reporting timeline</b><br>• Call the Regional Center AND police/APS <b>immediately</b> upon awareness of suspected abuse or neglect.<br>• Submit a written report to the Regional Center within <b>two (2) working days</b>.<br>Failure to report abuse is a misdemeanor punishable by up to six months in county jail and/or a fine up to $1,000.00.</div>`,
   acks:[
    "I certify that I am committed to providing a healthy environment for the Persons I serve and support.",
    "I understand I am a mandated reporter and must report any reasonable suspicion or known abuse/neglect to the Regional Center and all applicable authorities (police, APS) immediately, with a written report within two working days.",
    "I will annually review the zero-tolerance policy and the mandatory abuse and neglect reporting laws.",
    "I will participate in mandatory training on protecting Persons Served, recognizing signs of abuse/neglect, the reporting process, and the consequences of failing to follow the law or this policy.",
    "I understand the Regional Center and the agency expect full compliance with this policy and the reporting laws."
   ]},

  {id:"s6", no:"Section 6", title:"Whistleblower Policy", lede:"Reporting concerns without fear of retaliation.",
   annual:true,
   body:`<p>This policy ensures that Persons Served, families, providers, agencies, community members, and regional center staff can report suspicions, concerns, or evidence of illegal, unethical, or inappropriate activity without fear of retaliation.</p>
   <h4>No retaliation</h4>
   <p>No individual who reports a violation shall suffer harassment, retaliation, or adverse consequence. A staff member who retaliates is subject to discipline up to and including immediate termination.</p>
   <h4>How to report</h4>
   <p>Worthy Humans has an open-door policy. In most cases, your supervisor is best positioned to address a concern; if you are not comfortable, speak with another member of management. Supervisors must report suspected violations to the Director.<br>Executive contact: <b>WorthyHumans.execboard@gmail.com</b></p>
   <p>The Director will acknowledge receipt of a reported violation within five (5) business days. All reports are promptly investigated, and appropriate corrective action is taken if warranted.</p>`,
   acks:[
    "I have read and understand the Whistleblower Policy and the no-retaliation protections it provides.",
    "I understand how to report a concern and that supervisors must escalate suspected violations to the Director."
   ]},

  {id:"s7", no:"Section 7", title:"Drug-Free Workplace Policy", lede:"Maintaining a safe environment for staff and clients.",
   annual:true,
   body:`<p>WORTHY HUMANS, INC. maintains a strict policy against the use of alcohol and the unlawful use of drugs. Violation will result in disciplinary action up to and including immediate termination. The company reserves the right to conduct reasonable-suspicion testing consistent with California law.</p>`,

/* =========================================================================

   ========================================================================= */
const page = document.getElementById('page');

function el(html){const t=document.createElement('template');t.innerHTML=html.trim();return t.content.firstElementChild;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function today(){const d=new Date();return d.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});}
function nowStamp(){return new Date().toLocaleString('en-US',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}

/* ---- Employee info + e-signature setup ---- */
function buildSetup(){
  const c=el(`<div class="card setup" id="setup">
    <h2><span class="sec-no">Start here</span> Employee Information & Electronic Signature</h2>
    <p class="lede">Enter your details once. Your typed name becomes your electronic signature throughout this packet.</p>
    <div class="grid">
      <div class="field"><label class="req">Full legal name</label><input id="empName" placeholder="First M. Last"></div>
      <div class="field"><label class="req">Initials</label><input id="empInitials" maxlength="5" placeholder="e.g. JMD"></div>
      <div class="field"><label>Work email (for your copy)</label><input id="empEmail" type="email" placeholder="name@worthyhumans.org"></div>
      <div class="field"><label>Position / Title</label><input id="empPos" placeholder="Family Support Coordinator"></div>
      <div class="field"><label>First day of employment</label><input id="empStart" type="date"></div>
      <div class="field"><label>Department</label><input value="Coordinated Family Supports (CFS)" readonly></div>
    </div>
    <div class="consent">
      <input type="checkbox" id="esign" onchange="recalc()">
      <label for="esign"><b>Electronic signature consent.</b> I agree to use an electronic signature for this onboarding packet. I understand that typing my name or drawing it, and acknowledging each section, constitutes my legally binding signature, equivalent to a handwritten one, under the federal ESIGN Act and California UETA. Each acknowledgment is date- and time-stamped at the moment I sign it.</label>
    </div>

    <div class="sigmode">
      <span class="lbl">Signature style</span>
      <div class="seg">
        <button type="button" id="modeType" class="on" onclick="setSigMode('type')">Type my name</button>
        <button type="button" id="modeDraw" onclick="setSigMode('draw')">Draw it</button>
      </div>
      <span class="sig-meta" style="margin-left:6px">Applied to every section you sign.</span>
    </div>
    <div class="padwrap hide" id="padwrap">
      <canvas class="sigpad" id="sigpad" width="900" height="300" aria-label="Signature drawing area"></canvas>
      <div class="padrow">
        <span class="baseline">Draw your signature above with a mouse, trackpad, or finger.</span>
        <button type="button" class="btn" onclick="clearPad()">Clear</button>
        <button type="button" class="btn primary" onclick="savePad()">Use this signature</button>
      </div>
    </div>

    <details class="director">
      <summary>Director / Supervisor co-signature (optional — for ${directorIdentity.name})</summary>
      <div class="inner">
        <p class="lede" style="margin-top:12px">The CFS Director completes this to co-sign the packet and the Section 12 summary.</p>
        <div class="grid">
          <div class="field"><label>Director name</label><input id="dirName" value="${directorIdentity.name}"></div>
          <div class="field"><label>Director initials</label><input id="dirInitials" value="${directorIdentity.initials}" maxlength="5"></div>
          <div class="field"><label>Director email (where completed packets are sent)</label><input id="dirEmail" type="email" value="worthyhumans.execboard@gmail.com" placeholder="director@worthyhumans.org"></div>
        </div>
        <div class="consent" style="margin-top:12px"><input type="checkbox" id="dirEsign"><label for="dirEsign">I, the CFS Director, consent to electronically sign this packet.</label></div>
      </div>
    </details>
  </div>`);
  page.appendChild(c);

  const sync=()=>{ employeeIdentity.name=v('empName'); employeeIdentity.initials=v('empInitials').toUpperCase(); employeeIdentity.email=v('empEmail'); refreshSignatures(); };
  ['empName','empInitials','empEmail'].forEach(id=>document.getElementById(id).addEventListener('input',sync));
  document.getElementById('dirName').addEventListener('input',()=>{directorIdentity.name=v('dirName');refreshSignatures();});
  document.getElementById('dirInitials').addEventListener('input',()=>{directorIdentity.initials=v('dirInitials').toUpperCase();});
}
function v(id){const e=document.getElementById(id);return e?e.value.trim():"";}
function esignOK(){const e=document.getElementById('esign');return e&&e.checked;}

/* ---- signature style: type vs draw ---- */
let sigMode='type';
let drawnSig=null;        // dataURL of the employee's drawn signature
function setSigMode(m){
  sigMode=m;
  document.getElementById('modeType').classList.toggle('on',m==='type');
  document.getElementById('modeDraw').classList.toggle('on',m==='draw');
  document.getElementById('padwrap').classList.toggle('hide',m!=='draw');
  refreshSignatures();
}
function clearPad(){
  const cv=document.getElementById('sigpad');const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height); cv._has=false; drawnSig=null; refreshSignatures();
}
function savePad(){
  const cv=document.getElementById('sigpad');
  if(!cv._has){ toast("Draw your signature in the box first."); return; }
  drawnSig=cv.toDataURL('image/png');
  refreshSignatures(); toast("Signature saved — it will appear on every section you sign.");
}
function initSignaturePad(){
  const cv=document.getElementById('sigpad'); if(!cv)return;
  const ctx=cv.getContext('2d');
  ctx.lineCap='round'; ctx.lineJoin='round'; ctx.lineWidth=4; ctx.strokeStyle='#16323D';
  let drawing=false,last=null;
  const pt=e=>{const r=cv.getBoundingClientRect();const t=(e.touches&&e.touches[0])||e;
    return {x:(t.clientX-r.left)*(cv.width/r.width), y:(t.clientY-r.top)*(cv.height/r.height)};};
  const down=e=>{drawing=true;last=pt(e);ctx.beginPath();ctx.arc(last.x,last.y,ctx.lineWidth/2,0,Math.PI*2);ctx.fillStyle=ctx.strokeStyle;ctx.fill();cv._has=true;e.preventDefault();};
  const move=e=>{if(!drawing)return;const p=pt(e);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke();last=p;cv._has=true;e.preventDefault();};
  const up=()=>{drawing=false;};
  cv.addEventListener('mousedown',down);cv.addEventListener('mousemove',move);
  window.addEventListener('mouseup',up);
  cv.addEventListener('touchstart',down,{passive:false});cv.addEventListener('touchmove',move,{passive:false});
  cv.addEventListener('touchend',up);
}

/* ---- a generic section card ---- */
function buildSection(s){
  state[s.id]={acks:{}, signed:false, date:"", time:"", fields:{}, checks:{}};
  const card=el(`<div class="card sec" id="${s.id}"><h2><span class="sec-no">${s.no}</span> ${s.title}</h2><p class="lede">${s.lede}</p><div class="body">${s.body}</div></div>`);

  // Section 1 checklist
  if(s.type==="checklist"){
    checklistGroups.forEach((g,gi)=>{
      const grp=el(`<div class="ckgroup"><div class="acks-title">${g.title}</div></div>`);
      g.items.forEach((it,ii)=>{
        const key=`g${gi}i${ii}`;
        const row=el(`<label class="ack"><input type="checkbox"><span>${it}</span></label>`);
        row.querySelector('input').addEventListener('change',e=>{state[s.id].checks[key]=e.target.checked;row.classList.toggle('on',e.target.checked);});
        grp.appendChild(row);
      });
      card.appendChild(grp);
    });
  }

  // editable fields (Section 11 contacts)
  if(s.fields){
    const fwrap=el(`<div class="acks"><div class="acks-title">${s.fieldsTitle||'Details'}</div><div class="grid"></div></div>`);
    const grid=fwrap.querySelector('.grid');
    s.fields.forEach(f=>{
      const fld=el(`<div class="field"><label>${f.label}</label><input data-fk="${f.key}" value="${f.value||''}"></div>`);
      fld.querySelector('input').addEventListener('input',e=>state[s.id].fields[f.key]=e.target.value);
      if(f.value)state[s.id].fields[f.key]=f.value;
      grid.appendChild(fld);
    });
    card.appendChild(fwrap);
  }

  // acknowledgment checkboxes
  if(s.acks){
    const aw=el(`<div class="acks"><div class="acks-title">Acknowledgments — check each to confirm</div></div>`);
    s.acks.forEach((a,i)=>{
      const row=el(`<label class="ack"><input type="checkbox"><span>${a}</span></label>`);
      row.querySelector('input').addEventListener('change',e=>{state[s.id].acks[i]=e.target.checked;row.classList.toggle('on',e.target.checked);});
      aw.appendChild(row);
    });
    card.appendChild(aw);
  }

  // signature block
  const annual = s.annual ? `<div class="annual-note no-print">↻ This policy must be re-signed annually.</div>` : "";
  const sign=el(`<div class="sign" id="sign-${s.id}">
    <div class="row">
      <div>
        <div class="sig-render" id="sig-${s.id}"></div>
        <div class="sig-meta" id="sigmeta-${s.id}">Employee signature — pending</div>
      </div>
      <div style="text-align:right">
        <span class="badge pending" id="badge-${s.id}">Not signed</span><br>
        <button class="btn primary no-print" id="signbtn-${s.id}" style="margin-top:10px">Acknowledge & sign</button>
      </div>
    </div>
    ${annual}
  </div>`);
  card.appendChild(sign);
  page.appendChild(card);

  document.getElementById(`signbtn-${s.id}`).addEventListener('click',()=>toggleSign(s));
}

function allAcksChecked(s){
  if(!s.acks)return true;
  return s.acks.every((_,i)=>state[s.id].acks[i]);
}
function checklistDone(s){
  if(s.type!=="checklist")return true;
  // require at least Day-1 items + all groups fully checked
  let total=0,done=0;
  checklistGroups.forEach((g,gi)=>g.items.forEach((_,ii)=>{total++;if(state[s.id].checks[`g${gi}i${ii}`])done++;}));
  return done===total;
}

function toggleSign(s){
  const st=state[s.id];
  if(st.signed){ st.signed=false; st.date=""; st.time=""; renderSign(s); recalc(); return; }
  if(!employeeIdentity.name||!esignOK()){ toast("Complete your name and electronic-signature consent at the top first."); document.getElementById('setup').scrollIntoView({block:'center'}); flash('setup'); return; }
  if(sigMode==='draw' && !drawnSig){ toast("Draw and save your signature at the top first."); document.getElementById('setup').scrollIntoView({block:'center'}); flash('setup'); return; }
  if(s.type==="checklist" && !checklistDone(s)){ toast("Check every checklist item before signing."); return; }
  if(!allAcksChecked(s)){ toast("Check each acknowledgment before signing this section."); return; }
  st.signed=true; st.date=today(); st.time=nowStamp(); st.by=employeeIdentity.name;
  renderSign(s); recalc(); toast(`${s.no} signed.`);
}

function renderSign(s){
  const st=state[s.id];
  const sigEl=document.getElementById(`sig-${s.id}`);
  const meta=document.getElementById(`sigmeta-${s.id}`);
  const badge=document.getElementById(`badge-${s.id}`);
  const btn=document.getElementById(`signbtn-${s.id}`);
  const wrap=document.getElementById(`sign-${s.id}`);
  if(st.signed){
    if(sigMode==='draw' && drawnSig){ sigEl.innerHTML=`<img class="sig-img" src="${drawnSig}" alt="signature">`; }
    else { sigEl.textContent=st.by||employeeIdentity.name; }
    meta.innerHTML=`Employee signature · <b>${st.by||employeeIdentity.name}</b> — signed ${st.time}`;
    badge.className="badge done"; badge.textContent="✓ Signed";
    btn.textContent="Undo signature"; btn.classList.remove('primary'); btn.classList.add('ghost');
    wrap.classList.add('signed');
  }else{
    sigEl.textContent="";
    meta.textContent="Employee signature — pending";
    badge.className="badge pending"; badge.textContent="Not signed";
    btn.textContent="Acknowledge & sign"; btn.classList.add('primary'); btn.classList.remove('ghost');
    wrap.classList.remove('signed');
  }
}
function refreshSignatures(){ sections.forEach(s=>{ if(state[s.id]&&state[s.id].signed){state[s.id].by=employeeIdentity.name;renderSign(s);} }); }

/* ---- Section 12 summary (auto-rolling) ---- */
function buildSummary(){
  const rows=sections.map(s=>`<tr><td>${s.no} — ${s.title}</td><td id="sum-date-${s.id}">—</td><td id="sum-stat-${s.id}" class="s-pending">Pending</td></tr>`).join("");
  const c=el(`<div class="card sec" id="s12"><h2><span class="sec-no">Section 12</span> Staff Signature Summary Sheet</h2>
    <p class="lede">Director's master record — auto-populated from your signatures above.</p>
    <div class="grid" style="margin-bottom:14px">
      <div class="field"><label>Employee name</label><input id="sum-name" readonly></div>
      <div class="field"><label>Position</label><input id="sum-pos" readonly></div>
      <div class="field"><label>Start date</label><input id="sum-start" readonly></div>
      <div class="field"><label>LIVESCAN clearance date</label><input id="sum-livescan"></div>
      <div class="field"><label>CPR/First Aid certification date</label><input id="sum-cpr"></div>
      <div class="field"><label>CPR/First Aid expiration date</label><input id="sum-cprexp"></div>
      <div class="field"><label>Driver's License #</label><input id="sum-dl"></div>
      <div class="field"><label>Auto insurance expiration</label><input id="sum-ins"></div>
    </div>
    <table class="summary"><thead><tr><th>Document</th><th>Date signed</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table>
    <div class="sign signed" style="margin-top:18px">
      <div class="row">
        <div>
          <div class="sig-render" id="sig-dir"></div>
          <div class="sig-meta" id="sigmeta-dir">CFS Director signature — pending</div>
        </div>
        <div style="text-align:right">
          <span class="badge pending" id="badge-dir">Not signed</span><br>
          <button class="btn primary no-print" id="signbtn-dir" style="margin-top:10px">Director: sign packet</button>
        </div>
      </div>
      <div class="sig-meta" style="margin-top:10px">Date onboarding completed: <b id="dir-date">—</b></div>
    </div>
    <p class="footer-note" style="margin-top:18px">By signing, both the employee and the CFS Director confirm all documents in this packet were reviewed, explained, and signed on or before the date indicated. This document is confidential and must be retained in the employee's personnel file for the duration of employment and a minimum of five (5) years thereafter, or as required by applicable law.</p>
  </div>`);
  page.appendChild(c);
  // mirror summary detail fields into state
  ['sum-livescan','sum-cpr','sum-cprexp','sum-dl','sum-ins'].forEach(id=>{
    document.getElementById(id).addEventListener('input',()=>state.summary=Object.assign(state.summary||{},{[id]:v(id)}));
  });

}
function toggleDirSign(){
  state.dir=state.dir||{};
  if(state.dir.signed){state.dir={};renderDir();recalc();return;}
  const c=document.getElementById('dirEsign');
  if(!c||!c.checked){ toast("Enable Director co-signature consent in the Start-here section."); document.querySelector('details.director').open=true; document.getElementById('setup').scrollIntoView({block:'center'}); return; }
  state.dir={signed:true,by:directorIdentity.name,time:nowStamp()};
  renderDir();recalc();toast("Director signature applied.");
}
function renderDir(){
  const sig=document.getElementById('sig-dir'),meta=document.getElementById('sigmeta-dir'),badge=document.getElementById('badge-dir'),btn=document.getElementById('signbtn-dir'),dd=document.getElementById('dir-date');
  if(state.dir&&state.dir.signed){
    sig.textContent=state.dir.by;meta.innerHTML=`CFS Director · <b>${state.dir.by}</b> — signed ${state.dir.time}`;
    badge.className="badge done";badge.textContent="✓ Signed";btn.textContent="Undo Director signature";btn.classList.remove('primary');btn.classList.add('ghost');
    dd.textContent=state.dir.time;
  }else{sig.textContent="";meta.textContent="CFS Director signature — pending";badge.className="badge pending";badge.textContent="Not signed";btn.textContent="Director: sign packet";btn.classList.add('primary');btn.classList.remove('ghost');dd.textContent="—";}
}

/* ---- progress + summary refresh ---- */
function recalc(){
  let total=0,done=0;
  sections.forEach(s=>{ total++; if(state[s.id].signed)done++; });
  const pct=Math.round(done/total*100);
  document.getElementById('pfill').style.width=pct+"%";
  document.getElementById('pdone').textContent=done;
  document.getElementById('ptotal').textContent=total;
  document.getElementById('ppct').textContent=pct+"%";

  // summary table
  sections.forEach(s=>{
    const d=document.getElementById('sum-date-'+s.id), st=document.getElementById('sum-stat-'+s.id);
    if(state[s.id].signed){d.textContent=state[s.id].date;st.textContent="✓ Signed";st.className="s-done";}
    else{d.textContent="—";st.textContent="Pending";st.className="s-pending";}
  });
  // summary header mirrors
  setVal('sum-name',employeeIdentity.name);
  setVal('sum-pos',v('empPos'));
  setVal('sum-start',v('empStart'));

  // print stamp
  document.getElementById('printStamp').innerHTML =
    `Employee: <b>${employeeIdentity.name||'—'}</b> &nbsp;·&nbsp; ${done}/${total} sections signed &nbsp;·&nbsp; Generated ${nowStamp()}`;
}
function setVal(id,val){const e=document.getElementById(id);if(e)e.value=val||"";}
function flash(id){const e=document.getElementById(id);e.style.transition='box-shadow .3s';e.style.boxShadow='0 0 0 4px var(--seafoam-line)';setTimeout(()=>e.style.boxShadow='',900);}

/* ---- Table of contents ---- */
function buildTOC(){
  const links=sections.map(s=>`<a href="#${s.id}"><span class="n">${s.no.replace('Section ','§')}</span>${s.title}<span class="tick" id="toc-${s.id}"></span></a>`).join("");
  const c=el(`<div class="card toc-card no-print"><h2 style="font-size:18px">Packet contents</h2><div class="toc">${links}<a href="#s12"><span class="n">§12</span>Staff Signature Summary<span class="tick" id="toc-s12"></span></a></div></div>`);
  page.insertBefore(c, page.children[1]);
}

/* =========================================================================
   SAVE / LOAD  (file-based — no browser storage)
   ========================================================================= */
function snapshot(){
  return {
    _meta:{app:"WorthyHumans-Onboarding",version:1,savedAt:nowStamp()},
    employee:{name:employeeIdentity.name,initials:employeeIdentity.initials,email:employeeIdentity.email,
      position:v('empPos'),start:v('empStart'),esign:esignOK()},
    director:{name:v('dirName'),initials:v('dirInitials'),email:v('dirEmail'),esign:document.getElementById('dirEsign').checked, sig:state.dir||{}},
    signature:{mode:sigMode,drawn:drawnSig},
    summary:{livescan:v('sum-livescan'),cpr:v('sum-cpr'),cprexp:v('sum-cprexp'),dl:v('sum-dl'),ins:v('sum-ins')},
    state
  };
}
function saveProgress(){
  const data=snapshot();
  const safe=(employeeIdentity.name||'employee').replace(/[^a-z0-9]+/gi,'_');
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`WorthyHumans_Onboarding_${safe}.json`;a.click();URL.revokeObjectURL(a.href);
  toast("Progress saved to a file you control.");
}
function loadProgress(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const d=JSON.parse(r.result);
      document.getElementById('empName').value=d.employee.name||"";
      document.getElementById('empInitials').value=d.employee.initials||"";
      document.getElementById('empEmail').value=d.employee.email||"";
      document.getElementById('empPos').value=d.employee.position||"";
      document.getElementById('empStart').value=d.employee.start||"";
      document.getElementById('esign').checked=!!d.employee.esign;
      employeeIdentity.name=d.employee.name||"";employeeIdentity.initials=d.employee.initials||"";employeeIdentity.email=d.employee.email||"";
      if(d.director){document.getElementById('dirName').value=d.director.name||directorIdentity.name;document.getElementById('dirInitials').value=d.director.initials||"";if(d.director.email!=null)document.getElementById('dirEmail').value=d.director.email;document.getElementById('dirEsign').checked=!!d.director.esign;directorIdentity.name=d.director.name||directorIdentity.name;state.dir=d.director.sig||{};}
      if(d.signature){ drawnSig=d.signature.drawn||null; setSigMode(d.signature.mode||'type'); }
      if(d.summary){setVal('sum-livescan',d.summary.livescan);setVal('sum-cpr',d.summary.cpr);setVal('sum-cprexp',d.summary.cprexp);setVal('sum-dl',d.summary.dl);setVal('sum-ins',d.summary.ins);}
      // restore section state
      sections.forEach(s=>{
        const saved=d.state&&d.state[s.id];if(!saved)return;
        Object.assign(state[s.id],saved);
        // reflect checkboxes
        const card=document.getElementById(s.id);
        if(s.acks){const boxes=card.querySelectorAll('.acks .ack input');let ai=0;
          // acks are the last group of .ack inside .acks blocks; re-map by index
        }
        // simplest robust approach: re-tick by stored maps
        if(saved.acks){const ackRows=[...card.querySelectorAll('.acks')].slice(-1)[0];if(ackRows){[...ackRows.querySelectorAll('.ack')].forEach((row,i)=>{const on=!!saved.acks[i];row.querySelector('input').checked=on;row.classList.toggle('on',on);});}}
        if(saved.checks){[...card.querySelectorAll('.ckgroup')].forEach((grp,gi)=>{[...grp.querySelectorAll('.ack')].forEach((row,ii)=>{const on=!!saved.checks[`g${gi}i${ii}`];row.querySelector('input').checked=on;row.classList.toggle('on',on);});});}
        if(saved.fields){card.querySelectorAll('input[data-fk]').forEach(inp=>{const val=saved.fields[inp.dataset.fk];if(val!=null)inp.value=val;});}
        renderSign(s);
      });
      renderDir();recalc();refreshSignatures();
      toast("Progress loaded.");
    }catch(e){toast("Couldn't read that file — is it a saved progress file?");}
  };
  r.readAsText(f);input.value="";
}

function buildFinish(){
  const c=el(`<div class="card finish no-print" id="finish">
    <h2><span class="sec-no">Final step</span> Finish &amp; send your packet</h2>
    <p class="lede">When every section is signed, save your PDF copy and send it to your CFS Director — you each keep an identical signed record.</p>
    <ol style="margin:6px 0 0;padding-left:20px;font-size:14px;line-height:1.85">
      <li><b>Save your PDF.</b> Produces the signed copy for your own records.</li>
      <li><b>Open the email.</b> It opens pre-addressed to your Director with a summary filled in — attach the PDF you just saved, then send.</li>
    </ol>
    <div class="actions">
      <button class="btn primary" onclick="window.print()">Save signed PDF</button>
      <button class="btn" id="emailBtn" onclick="finishAndSend()">Open email to Director</button>
    </div>
    <div class="pending-list" id="finishPending"></div>
  </div>`);
  page.appendChild(c);
}
function finishAndSend(){
  const fp=document.getElementById('finishPending');
  if(!employeeIdentity.name||!esignOK()){ toast("Complete the Start-here section first."); document.getElementById('setup').scrollIntoView({block:'center'}); return false; }
  const pending=sections.filter(s=>!state[s.id].signed).map(s=>s.no.replace('Section ','§'));
  if(pending.length){ fp.textContent="Still unsigned: "+pending.join(", ")+". Please sign every section before sending."; toast("Some sections are still unsigned."); return false; }
  fp.textContent="";
  const to=v('dirEmail')||'worthyhumans.execboard@gmail.com';
  const subj=`Completed Onboarding Packet — ${employeeIdentity.name}`;
  const body=[
    "Hello,","",
    "My onboarding packet is complete. All required sections are electronically signed and dated.","",
    "Name: "+employeeIdentity.name,
    "Position: "+(v('empPos')||"—"),
    "Start date: "+(v('empStart')||"—"),
    "Completed: "+nowStamp(),"",
    "The signed PDF is attached. (If your email window opened without it, please attach the PDF you just saved.)","",
    "Thank you,",employeeIdentity.name
  ].join("\n");
  window.location.href=`mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`;
  return true;
}
